              <div className="bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[2rem] shadow-xl w-full max-w-md">

                  <p className="text-center text-emerald-700 font-bold text-xs uppercase">Chemistry by Krupanpassa</p>

        const PasswordModal = ({ lang, title, expectedPwd, onSuccess, onBack }) => {
          const [pwd, setPwd] = useState('');
          const [err, setErr] = useState(false);
          const t = dict[lang].roomSelect;
          const handleSubmit = (e) => { e.preventDefault(); if (pwd === expectedPwd) { setErr(false); onSuccess(); } else setErr(true); };
          return (
            <div className="fixed inset-0 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm z-50">

                  <input type="password" autoFocus value={pwd} onChange={e=>setPwd(e.target.value)} className="w-full text-center text-2xl tracking-widest bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-4 focus:border-emerald-500 text-slate-800 font-mono shadow-inner" placeholder="****" />
                  <button type="submit" className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 shadow-md">{t.submit}</button>
                </form>
              </div>
            </div>
          );
        };

        const TeacherDashboard = ({ lang, students, onLogout }) => {
          const t = dict[lang].teacher;
          const [filterRoom, setFilterRoom] = useState('All');
          
          const sortedStudents = [...students].sort((a, b) => {
            const roomA = String(a.room || ''); const roomB = String(b.room || '');
            if (roomA !== roomB) return roomA.localeCompare(roomB, undefined, {numeric: true});
            return (parseInt(a.number, 10) || 0) - (parseInt(b.number, 10) || 0);
          });

          const filteredStudents = sortedStudents.filter(s => filterRoom === 'All' || s.room === filterRoom);
          const availableRooms = [...new Set(students.map(s => s.room).filter(Boolean))].sort();

          const calculateGain = (pre, post) => {
            if (pre == null || post == null || pre === undefined || post === undefined) return '-';
            if (pre === 10) return post === 10 ? '100%' : 'Drop';
            return (((post - pre) / (10 - pre)) * 100).toFixed(1) + '%';
          };

          const handleDelete = async (uid) => {
            if (window.confirm(t.deleteConfirm)) { try { await deleteDoc(uid); } catch (err) {} }
          };

          const exportCSV = () => {
            const headers = [t.table.number, t.table.name, t.table.room, t.table.pre, t.table.post, t.table.dev];
            const rows = filteredStudents.map(s => [
              s.number, `"${s.name}"`, s.room,
              s.pretestScore ?? '-', s.posttestScore ?? '-',
              calculateGain(s.pretestScore, s.posttestScore).replace('%', '')
            ]);
            const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', `Student_Scores_${filterRoom === 'All' ? 'All_Rooms' : filterRoom.replace('/', '-')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
          };

          const exportPDF = async () => {
            try {
              if (!window.html2canvas || !window.jspdf) return alert("ไลบรารี PDF โหลดไม่สำเร็จ");
              const { jsPDF } = window.jspdf;
              const pdf = new jsPDF('p', 'mm', 'a4');
              const chunkSize = 20;
              const pages = Math.ceil(filteredStudents.length / chunkSize) || 1;

              for (let p = 0; p < pages; p++) {
                const el = document.getElementById(`pdf-page-${p}`);
                if (!el) continue;
                const originalDisplay = el.style.display; el.style.display = 'block';
                const canvas = await window.html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                el.style.display = originalDisplay;
                if (p > 0) pdf.addPage();
                const imgData = canvas.toDataURL('image/png');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
              }
              pdf.save(`Teacher_Report_${filterRoom}.pdf`);
            } catch (error) { alert("เกิดข้อผิดพลาดในการสร้าง PDF"); }
          };

          const chunks = [];
          for (let i = 0; i < filteredStudents.length; i += 20) chunks.push(filteredStudents.slice(i, i + 20));
          if (chunks.length === 0) chunks.push([]);

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 w-full">
              <div className="max-w-6xl mx-auto">
                <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 w-full">
                  <h1 className="text-2xl md:text-3xl font-black text-slate-800 flex items-center gap-3"><TeacherMinimalIcon className="w-10 h-10 text-blue-600" /> {t.dashboard}</h1>
                  <div className="flex flex-wrap gap-3 md:gap-4 w-full md:w-auto items-center">
                    <select value={filterRoom} onChange={e => setFilterRoom(e.target.value)} className="px-4 py-3 rounded-xl border border-slate-200 font-bold text-slate-700 bg-white shadow-sm flex-1 md:flex-none">
                      <option value="All">{t.filterAll}</option>{availableRooms.map(r => <option key={r} value={r}>{t.filterRoom} {r}</option>)}
                    </select>
                    <button onClick={exportCSV} className="flex-1 md:flex-none bg-teal-600 hover:bg-teal-700 text-white px-4 md:px-6 py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2"><ChartIcon className="w-5 h-5"/> <span className="hidden sm:inline">{t.exportCSV}</span></button>
                    <button onClick={exportPDF} className="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-4 md:px-6 py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2"><DownloadIcon className="w-5 h-5"/> <span className="hidden sm:inline">{t.exportPDF}</span></button>
                    <button onClick={onLogout} className="flex-1 md:flex-none bg-white border border-slate-200 text-slate-700 px-4 md:px-6 py-3 rounded-xl font-bold shadow-sm">{t.logout}</button>
                  </div>
                </div>
                
                <div className="bg-white rounded-[2rem] shadow-xl border border-slate-100 p-4 md:p-10 w-full overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                      <tr className="border-b-2 border-slate-200">
                        <th className="py-4 px-4 font-black text-slate-500 uppercase">{t.table.number}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase">{t.table.name}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase">{t.table.room}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase text-center">{t.table.pre}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase text-center">{t.table.post}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase text-center">{t.table.dev}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase text-center">{t.table.status}</th>
                        <th className="py-4 px-4 font-black text-slate-500 uppercase text-center">{t.table.manage}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredStudents.length === 0 && <tr><td colSpan="8" className="py-12 text-center text-slate-400 font-bold">{t.noData}</td></tr>}
                      {filteredStudents.map((s, idx) => {
                        const isOnline = Date.now() - (s.lastActive || 0) < 5 * 60 * 1000;
                        return (
                          <tr key={s.id || idx} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                            <td className="py-4 px-4 font-bold text-slate-700">{s.number}</td><td className="py-4 px-4 font-bold text-slate-800">{s.name}</td><td className="py-4 px-4 font-bold text-emerald-600">{s.room}</td>
                            <td className="py-4 px-4 text-center font-bold text-slate-600 bg-slate-50/50">{s.pretestScore ?? '-'}</td>
                            <td className="py-4 px-4 text-center font-bold text-slate-600 bg-emerald-50/30">{s.posttestScore ?? '-'}</td>
                            <td className="py-4 px-4 text-center font-bold text-emerald-600 bg-emerald-50/50">{calculateGain(s.pretestScore, s.posttestScore)}</td>
                            <td className="py-4 px-4 text-center"><span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${isOnline ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}><span className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}`}></span>{isOnline ? t.online : t.offline}</span></td>
                            <td className="py-4 px-4 text-center"><button onClick={() => handleDelete(s.id)} className="bg-red-100 text-red-600 hover:bg-red-200 px-3 py-1.5 rounded-lg text-xs font-bold">ลบ</button></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <div style={{ position: 'absolute', left: '-9999px', top: 0 }}>
                  {chunks.map((chunk, pageIndex) => (
                    <div key={`pdf-page-${pageIndex}`} id={`pdf-page-${pageIndex}`} className="bg-white font-prompt" style={{ width: '794px', minHeight: '1123px', padding: '40px', boxSizing: 'border-box', display: 'none' }}>
                      <div className="text-center mb-8 border-b-2 border-slate-800 pb-4">
                         <h2 className="text-2xl font-black text-slate-900">สรุปคะแนนผู้เรียน (Student Report)</h2>
                         <p className="text-slate-600 mt-1 font-bold">PowerUp Galvanic Cell | {filterRoom === 'All' ? 'ทุกห้องเรียน' : `ห้อง ${filterRoom}`} | หน้า {pageIndex + 1} / {chunks.length}</p>
                      </div>
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-slate-100 text-slate-800"><th className="py-3 px-3 border border-slate-300">เลขที่</th><th className="py-3 px-3 border border-slate-300">ชื่อ-สกุล</th><th className="py-3 px-3 border border-slate-300 text-center">ห้อง</th><th className="py-3 px-3 border border-slate-300 text-center">ก่อนเรียน</th><th className="py-3 px-3 border border-slate-300 text-center">หลังเรียน</th><th className="py-3 px-3 border border-slate-300 text-center">พัฒนาการ</th></tr>
                        </thead>
                        <tbody>
                          {chunk.map((s, idx) => (
                            <tr key={idx}><td className="py-3 px-3 border border-slate-200 text-center">{s.number}</td><td className="py-3 px-3 border border-slate-200">{s.name}</td><td className="py-3 px-3 border border-slate-200 text-center">{s.room}</td><td className="py-3 px-3 border border-slate-200 text-center">{s.pretestScore ?? '-'}</td><td className="py-3 px-3 border border-slate-200 text-center">{s.posttestScore ?? '-'}</td><td className="py-3 px-3 border border-slate-200 text-center">{calculateGain(s.pretestScore, s.posttestScore)}</td></tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        };

        const QuizComponent = ({ lang, title, questions, onFinish, hideSubmit, isPretest, previousScore }) => {
          const t = dict[lang].quiz;
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(hideSubmit || false);
          const [score, setScore] = useState(previousScore ?? 0);
          const [displayQuestions, setDisplayQuestions] = useState([]);

          useEffect(() => {
            if (isPretest) { setDisplayQuestions(questions); } 
            else {
              const q1to8 = questions.slice(0, 8); const q9to10 = questions.slice(8);
              setDisplayQuestions([...q1to8.sort(() => Math.random() - 0.5), ...q9to10]);
            }
          }, [questions, isPretest]);

          const handleSelect = (qIndex, oIndex) => { if (!submitted && !hideSubmit) setAnswers({ ...answers, [qIndex]: oIndex }); };
          const handleSubmit = () => {
            let s = 0; displayQuestions.forEach((q, i) => { if (answers[i] === q.ans) s++; });
            setScore(s); setSubmitted(true); if (onFinish) onFinish(s); window.scrollTo({ top: 0, behavior: 'smooth' });
          };
          const resetQuiz = () => { setAnswers({}); setSubmitted(false); setScore(0); window.scrollTo({ top: 0, behavior: 'smooth' }); };

          return (
            <div className="w-full max-w-4xl mx-auto bg-white/90 backdrop-blur-lg p-6 md:p-12 rounded-[2rem] shadow-xl border border-slate-100">
              <h2 className="text-2xl md:text-3xl font-black mb-8 text-center text-slate-800 bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-600">{title}</h2>
              {submitted && (
                <div className={`mb-10 p-6 md:p-8 rounded-2xl text-center border-2 shadow-sm ${score >= 5 ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                  <h3 className="text-3xl md:text-4xl font-black mb-3">{t.score} {score} / 10</h3>
                  {!isPretest && <p className="mb-6 font-bold text-base md:text-lg">{score >= 8 ? t.excellent : score >= 5 ? t.pass : t.fail}</p>}
                  {!isPretest && !hideSubmit && <button onClick={resetQuiz} className="bg-white border-2 border-slate-200 text-slate-700 px-8 py-3 rounded-xl font-bold shadow-sm mt-4">{t.tryAgain}</button>}
                  {isPretest && <p className="font-bold text-base md:text-lg text-slate-600 mt-4">{lang === 'th' ? "บันทึกคะแนนเรียบร้อยแล้ว กรุณาศึกษาทฤษฎีในขั้นตอนถัดไป" : "Score saved. Proceed to theory."}</p>}
                </div>
              )}
              {(!submitted || !isPretest) && (
                <div className="space-y-8">
                  {displayQuestions.map((q, qIndex) => (
                    <div key={qIndex} className="w-full">
                      {q.scenario && (
                        <div className="bg-emerald-50/50 border border-emerald-200 p-6 md:p-8 rounded-2xl mb-6 text-slate-800 text-sm md:text-base leading-relaxed shadow-inner">
                          <strong className="block mb-3 text-emerald-800 text-lg">{q.scenario.title[lang]}</strong>
                          <p className="font-medium text-slate-600">{q.scenario.desc[lang]}</p>
                          {q.scenarioImage && React.createElement(q.scenarioImage)}
                        </div>
                      )}
                      <div className={`p-6 md:p-8 rounded-2xl border-2 transition-all w-full overflow-hidden ${submitted && !isPretest ? (answers[qIndex] === q.ans ? 'border-emerald-300 bg-emerald-50/30 shadow-sm' : 'border-slate-200 bg-slate-50/50') : 'border-slate-100 bg-white shadow-md hover:shadow-lg'}`}>
                        <p className="font-bold text-base md:text-lg mb-6 text-slate-800 leading-snug">{isPretest ? q.q[lang] : q.q[lang].replace(/^\d+\.\s*/, '')}</p>
                        {q.image && React.createElement(q.image)}
                        <div className="space-y-4">
                          {q.options[lang].map((opt, oIndex) => {
                            const isSelected = answers[qIndex] === oIndex; const isCorrect = oIndex === q.ans;
                            let btnClass = "w-full text-left p-4 rounded-xl text-sm md:text-base font-semibold transition-all border-2 break-words flex items-start ";
                            if (!submitted) btnClass += isSelected ? "bg-emerald-50 text-emerald-700 border-emerald-500 shadow-md transform scale-[1.01]" : "bg-white text-slate-600 border-slate-100 hover:border-slate-300 hover:bg-slate-50 shadow-sm";
                            else {
                              if (isPretest) btnClass += isSelected ? "bg-slate-100 text-slate-700 border-slate-400 opacity-80" : "bg-white text-slate-400 border-slate-100 opacity-50";
                              else {
                                if (isCorrect) btnClass += "bg-emerald-100 text-emerald-800 border-emerald-500 shadow-sm";
                                else if (isSelected && !isCorrect) btnClass += "bg-red-50 text-red-600 border-red-300 line-through opacity-80";
                                else btnClass += "bg-slate-50 text-slate-400 border-slate-100 opacity-50";
                              }
                            }
                            return <button key={oIndex} disabled={submitted} onClick={() => handleSelect(qIndex, oIndex)} className={btnClass}><span className="inline-block w-8 font-black opacity-60 flex-shrink-0">{String.fromCharCode(65 + oIndex)}.</span> <span className="flex-1">{opt}</span></button>;
                          })}
                        </div>
                        {!isPretest && submitted && answers[qIndex] !== q.ans && (
                          <div className="mt-6 text-sm text-emerald-800 bg-emerald-100 border border-emerald-200 px-5 py-4 rounded-xl font-bold shadow-sm flex items-start gap-3">
                            <span className="text-emerald-600 text-lg leading-none flex-shrink-0">✓</span> 
                            <div className="break-words"><span className="opacity-70 mr-1">{t.correct}</span> {String.fromCharCode(65 + q.ans)}. {q.options[lang][q.ans]}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

        const GalvanicCellSimulator = ({ lang }) => {
          const t = dict[lang].sim;
          const [slots, setSlots] = useState({ left: { solId: null, metalId: null }, right: { solId: null, metalId: null } });
          const [blackProbe, setBlackProbe] = useState('home'); 
          const [redProbe, setRedProbe] = useState('home');
          const [selectedProbe, setSelectedProbe] = useState(null); 
          const [selectedTool, setSelectedTool] = useState(null);
          const [showFullAnimation, setShowFullAnimation] = useState(false);
          const [warning, setWarning] = useState(null);
          const [isSaltBridgePlaced, setIsSaltBridgePlaced] = useState(false);
          const [lives, setLives] = useState(5); 
          const [isGameWon, setIsGameWon] = useState(false);
          const [gameFeedback, setGameFeedback] = useState(null);
          const [ansOx, setAnsOx] = useState({ r1: '', p1: '', p2: '' }); 
          const [ansRed, setAnsRed] = useState({ r1: '', r2: '', p1: '' });
          const [calcCathode, setCalcCathode] = useState('');
          const [calcAnode, setCalcAnode] = useState('');
          const [calcResult, setCalcResult] = useState('');
          const canvasWrapperRef = useRef(null); 
          const [scale, setScale] = useState(1);
          
          useEffect(() => {
            if (!canvasWrapperRef.current) return;
            const observer = new ResizeObserver(entries => { for (let entry of entries) setScale(Math.min(1, entry.contentRect.width / 850)); });
            observer.observe(canvasWrapperRef.current); return () => observer.disconnect();
          }, []);
          
          useEffect(() => {
            if (blackProbe !== 'home' && redProbe !== 'home' && !isSaltBridgePlaced) setWarning(t.warnNoBridgeAlert);
          }, [blackProbe, redProbe, isSaltBridgePlaced, t.warnNoBridgeAlert]);

          useEffect(() => { if (warning) { const timer = setTimeout(() => setWarning(null), 4000); return () => clearTimeout(timer); } }, [warning]);

          const handleResetQuiz = () => { 
            setLives(5); setIsGameWon(false); setGameFeedback(null); 
            setAnsOx({ r1: '', p1: '', p2: '' }); setAnsRed({ r1: '', r2: '', p1: '' }); 
            setCalcCathode(''); setCalcAnode(''); setCalcResult(''); 
          };
          const handleReset = () => { 
            setSlots({ left: { solId: null, metalId: null }, right: { solId: null, metalId: null } }); 
            setBlackProbe('home'); setRedProbe('home'); 
            setIsSaltBridgePlaced(false); setSelectedProbe(null); setSelectedTool(null); setShowFullAnimation(false); setWarning(null); handleResetQuiz(); 
          };
          
          useEffect(() => { handleResetQuiz(); }, [slots.left.metalId, slots.right.metalId, slots.left.solId, slots.right.solId, blackProbe, redProbe, isSaltBridgePlaced]);

          const getMetalData = (id) => id ? METALS_DATA.find(m => m.id === id) : null;
          const blackMetal = blackProbe !== 'home' ? getMetalData(slots[blackProbe].metalId) : null;
          const redMetal = redProbe !== 'home' ? getMetalData(slots[redProbe].metalId) : null;
          const isCircuitComplete = blackMetal && redMetal && blackProbe !== redProbe && isSaltBridgePlaced;
          
          let voltage = "0.00", anode = null, cathode = null, isCorrectPolarity = true, anodeSlot = null, cathodeSlot = null;

          if (blackMetal && redMetal && blackProbe !== redProbe) {
            if (blackMetal.e0 < redMetal.e0) { 
              anode = blackMetal; cathode = redMetal; anodeSlot = blackProbe; cathodeSlot = redProbe; isCorrectPolarity = true; 
            } else { 
              anode = redMetal; cathode = blackMetal; anodeSlot = redProbe; cathodeSlot = blackProbe; isCorrectPolarity = false; 
            }
            voltage = isSaltBridgePlaced ? (isCorrectPolarity ? `+ ${(cathode.e0 - anode.e0).toFixed(2)}` : `- ${(anode.e0 - cathode.e0).toFixed(2)}`) : "0.00";
          }

          const handleDrop = (target, type, id) => {
            if (type === 'bridge') {
              if (!slots.left.solId || !slots.right.solId) return setWarning(t.warnSol);
              if (!slots.left.metalId || !slots.right.metalId) return setWarning(t.warnNeedMetalFirst);
              if (blackProbe === 'home' || redProbe === 'home') return setWarning(t.warnProbeFirst);
              setIsSaltBridgePlaced(true); setSelectedTool(null); setWarning(null); return;
            }
            const currentSol = slots[target].solId, currentMetal = slots[target].metalId;
            if (type === 'sol') {
              if (currentMetal) return setWarning(t.warnMetalRe);
              setSlots(prev => ({ ...prev, [target]: { ...prev[target], solId: id } })); setWarning(null); setSelectedTool(null);
            } else if (type === 'metal') {
              if (!currentSol) return setWarning(t.warnNeedSolFirst);
              if (currentSol !== id) return setWarning(t.warnMatch);
              setSlots(prev => ({ ...prev, [target]: { ...prev[target], metalId: id } })); setWarning(null); setSelectedTool(null);
            }
          };

          const handleClearSlot = (target, e) => {
            e.stopPropagation(); 
            if (blackProbe === target) setBlackProbe('home'); 
            if (redProbe === target) setRedProbe('home');
            setSlots(prev => ({ ...prev, [target]: { solId: null, metalId: null } })); 
            setIsSaltBridgePlaced(false);
          };

          const handleBeakerClick = (target) => {
            if (selectedTool) return selectedTool.type === 'bridge' ? handleDrop('center', 'bridge', null) : handleDrop(target, selectedTool.type, selectedTool.id);
            if (selectedProbe) {
              if (!slots[target].metalId) return setWarning(t.warnProbe);
              if (selectedProbe === 'black') { if (redProbe === target) setRedProbe('home'); setBlackProbe(target); setSelectedProbe(null); } 
              else if (selectedProbe === 'red') { if (blackProbe === target) setBlackProbe('home'); setRedProbe(target); setSelectedProbe(null); }
            }
          };

          const handleProbeSelect = (color) => { setSelectedProbe(prev => prev === color ? null : color); setSelectedTool(null); };
          const handleHomeClick = (color) => { if (color === 'black') setBlackProbe('home'); if (color === 'red') setRedProbe('home'); };

          const checkGameAnswer = () => {
            if (!anode || !cathode) return;
            const isOxCorrect = ansOx.r1 === anode.symbol && ansOx.p1 === anode.ion && ansOx.p2 === `${anode.eCount}e⁻`;
            const isRedCorrect = ansRed.r1 === cathode.ion && ansRed.r2 === `${cathode.eCount}e⁻` && ansRed.p1 === cathode.symbol;
            
            const isCathodeCorrect = parseFloat(calcCathode || 0).toFixed(2) === parseFloat(cathode.e0).toFixed(2);
            const isAnodeCorrect = parseFloat(calcAnode || 0).toFixed(2) === parseFloat(anode.e0).toFixed(2);
            const expectedE0 = Math.abs(cathode.e0 - anode.e0).toFixed(2);
            const isE0Correct = parseFloat(calcResult || 0).toFixed(2) === expectedE0;

            if (isOxCorrect && isRedCorrect && isCathodeCorrect && isAnodeCorrect && isE0Correct) { 
              setIsGameWon(true); setGameFeedback(t.winMsg); 
            } else { 
              const newLives = lives - 1; setLives(newLives); 
              if (newLives > 0) { setGameFeedback(t.wrongMsg); } else { setGameFeedback(t.loseMsg); setTimeout(() => handleReset(), 3000); } 
            }
          };

          const METER_PORTS = { black: { x: 375, y: 155 }, red: { x: 475, y: 155 } }; 
          const getClipPos = (pos, color) => {
            if (pos === 'home') return { x: color === 'black' ? 240 : 610, y: 140 }; 
            return { x: pos === 'left' ? 230 : 620, y: 200 }; 
          };
          const drawWire = (pos, color) => { 
            const p = METER_PORTS[color], s = getClipPos(pos, color); 
            const wireY = pos === 'home' ? s.y : s.y - 60; 
            if (pos === 'home') return `M ${s.x},${wireY} C ${s.x},${wireY + 60} ${p.x},${wireY + 60} ${p.x},${p.y}`;
            return `M ${s.x},${wireY} C ${s.x},${wireY - 40} ${p.x},${p.y - 40} ${p.x},${p.y}`; 
          };

          const getElectronPaths = () => {
            if (!anodeSlot || !cathodeSlot) return {p1:'', p2:''};
            const aCol = anodeSlot === blackProbe ? 'black' : 'red'; const cCol = cathodeSlot === blackProbe ? 'black' : 'red';
            const sA = getClipPos(anodeSlot, aCol), pA = METER_PORTS[aCol]; const sC = getClipPos(cathodeSlot, cCol), pC = METER_PORTS[cCol];
            const aWireY = sA.y - 60; const cWireY = sC.y - 60;
            return {
              p1: `M ${sA.x},${aWireY} C ${sA.x},${aWireY - 40} ${pA.x},${pA.y - 40} ${pA.x},${pA.y}`,
              p2: `M ${pC.x},${pC.y} C ${pC.x},${pC.y - 40} ${sC.x},${cWireY - 40} ${sC.x},${cWireY}`
            };
          };

          const generateNetEq = () => {
            if (!anode || !cathode) return "";
            const l = lcm(anode.eCount, cathode.eCount);
            const mA = l / anode.eCount; const mC = l / cathode.eCount;
            return `${mA>1?mA:''}${anode.symbol}(s) + ${mC>1?mC:''}${cathode.ion}(aq) → ${mA>1?mA:''}${anode.ion}(aq) + ${mC>1?mC:''}${cathode.symbol}(s)`;
          };

          let needleAngle = 0; 
          if (isCircuitComplete) {
            const expectedE0 = Math.abs(cathode.e0 - anode.e0);
            if (isCorrectPolarity) { needleAngle = (expectedE0 / 4.0) * 60; if(needleAngle > 60) needleAngle = 60; } 
            else { needleAngle = -(expectedE0 / 4.0) * 60; if(needleAngle < -60) needleAngle = -60; }
          }

          const renderLattice = (metal, isC) => {
            const atoms = [];
            for (let r = -2; r <= 2; r++) {
              for (let c = -1; c <= 2; c++) {
                let x = c * 28 + ((r % 2 === 0) ? 0 : 14), y = r * 24.2;
                if ((!isC && c === 2 && (r === 0 || r === 1)) || (isC && c === -1 && (r === 0 || r === 1))) continue;
                atoms.push(
                  <g key={`lat-${r}-${c}`} transform={`translate(${x}, ${y})`}>
                    <circle r="14" fill={metal.color} stroke={metal.textColor} strokeWidth="1.5" opacity="0.9" />
                    <text y="4" textAnchor="middle" fontSize="10" fontWeight="800" fill={metal.textColor}>{metal.symbol}</text>
                  </g>
                );
              }
            } return atoms;
          };

          const renderBgIons = (solColor, ionName) => (
            <g opacity="0.4">
              <text x="120" y="300" fontSize="16" fontWeight="bold" fill="#3b82f6">{ionName}</text>
              <text x="200" y="380" fontSize="16" fontWeight="bold" fill="#3b82f6">{ionName}</text>
              <text x="140" y="350" fontSize="16" fontWeight="bold" fill="#ef4444">SO₄²⁻</text>
              <text x="240" y="250" fontSize="16" fontWeight="bold" fill="#ef4444">SO₄²⁻</text>
            </g>
          );

          const optsS = anode && cathode ? [anode.symbol, anode.ion, cathode.symbol, cathode.ion] : [], optsE = ['1e⁻', '2e⁻', '3e⁻'];
          const s1Done = slots.left.solId && slots.right.solId;
          const s2Done = slots.left.metalId && slots.right.metalId;
          const s3Done = blackProbe !== 'home' && redProbe !== 'home';

          return (

              await new Promise(r => setTimeout(r, 150));
              window.html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Report_${userInfo.name.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                el.style.maxHeight = originalMaxH; el.style.overflow = originalOverflow;
              });
            }
          };

          return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-[fadeIn_0.3s] font-prompt">
              <div className="bg-white rounded-[2rem] md:rounded-[3rem] w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[95vh] border-4 border-white">
                <div className="overflow-y-auto flex-1 p-0">
                  <div id="report-capture-area-inner" className="p-6 md:p-12 bg-white">
                    <div className="flex justify-center mb-6">
                      <div className="bg-emerald-50 p-5 rounded-full shadow-inner"><ChartIcon className="w-10 h-10 md:w-14 md:h-14 text-emerald-600" /></div>
                    </div>
                    <h2 className="text-2xl md:text-4xl font-black text-center text-slate-800 mb-8">{t.title}</h2>
                    
                    <div className="bg-slate-50 rounded-2xl md:rounded-3xl p-6 md:p-8 border border-slate-200 mb-8 shadow-sm">
                      <h3 className="text-xs md:text-sm font-black text-slate-400 uppercase tracking-widest mb-4 md:mb-5 border-b border-slate-200 pb-3">{t.studentInfo}</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
                        <div><p className="text-xs text-slate-500 mb-1 font-bold">{dict[lang].register.name}</p><p className="font-black text-lg md:text-xl text-slate-800">{userInfo.name}</p></div>
                        <div><p className="text-xs text-slate-500 mb-1 font-bold">{dict[lang].register.room} / {dict[lang].register.number}</p><p className="font-black text-lg md:text-xl text-slate-800">{userInfo.room} / {userInfo.number}</p></div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 md:gap-6 mb-8">
                      <div className="bg-white border-2 border-slate-100 rounded-2xl md:rounded-3xl p-6 md:p-8 text-center shadow-md flex flex-col items-center justify-center">
                        <p className="text-xs md:text-sm font-bold text-slate-400 mb-2 md:mb-3 uppercase tracking-wider">{t.pre}</p>
                        <p className="text-4xl md:text-5xl font-black text-slate-800">{pretestScore !== null ? pretestScore : '-'}<span className="text-xl md:text-2xl text-slate-300">/10</span></p>
                      </div>
                      <div className="bg-white border-2 border-slate-100 rounded-2xl md:rounded-3xl p-6 md:p-8 text-center shadow-md flex flex-col items-center justify-center">
                        <p className="text-xs md:text-sm font-bold text-slate-400 mb-2 md:mb-3 uppercase tracking-wider">{t.post}</p>
                        <p className="text-4xl md:text-5xl font-black text-slate-800">{posttestScore !== null ? posttestScore : '-'}<span className="text-xl md:text-2xl text-slate-300">/10</span></p>
                      </div>
                    </div>

                    {isComplete && (
                      <div className={`p-6 md:p-8 rounded-2xl md:rounded-3xl text-center border-2 shadow-sm ${gainColor}`}>
                        <p className="text-xs md:text-sm font-bold mb-3 opacity-70 uppercase tracking-widest">{t.dev}</p>
                        <div className="flex flex-col items-center justify-center gap-3">
                          <span className="text-4xl md:text-5xl font-black mb-2 drop-shadow-sm">
                            {gainIcon} {relativeGain > 0 ? '+' : ''}{relativeGain.toFixed(1)}%
                          </span>
                          <span className="font-black text-base md:text-lg px-6 py-2 rounded-full bg-white shadow-sm tracking-wide">
                            {gainLevel}
                          </span>
                          <p className="text-[10px] md:text-xs opacity-60 mt-4 font-mono tracking-wider font-bold bg-white/50 px-4 py-1.5 rounded-lg w-full overflow-hidden text-ellipsis whitespace-nowrap">{t.formulaStr}</p>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
                <div className="p-4 md:p-6 bg-slate-50 border-t border-slate-200 flex flex-col sm:flex-row gap-3 md:gap-4 justify-end">
                  <button onClick={onClose} className="w-full sm:w-auto px-8 py-3 md:py-4 bg-white border border-slate-200 text-slate-700 rounded-xl md:rounded-2xl font-bold hover:bg-slate-100 transition-colors order-2 sm:order-1 shadow-sm">{t.close}</button>
                  <button onClick={handleExport} className="w-full sm:w-auto px-10 py-3 md:py-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-xl md:rounded-2xl font-bold hover:from-emerald-600 hover:to-teal-600 transition-colors shadow-md flex items-center justify-center gap-3 order-1 sm:order-2"><DownloadIcon className="w-5 h-5 md:w-6 md:h-6" /> {t.export}</button>
                </div>
              </div>
            </div>
          );
        };

        const App = () => {
          const [lang, setLang] = useState(null); 
          const [view, setView] = useState('lang'); 
          const [selectedRole, setSelectedRole] = useState(null);
          const [selectedRoom, setSelectedRoom] = useState(null);
          const [showToast, setShowToast] = useState(false);
          const [userInfo, setUserInfo] = useState(null);
          const [activeTab, setActiveTab] = useState('pretest'); 
          const [pretestScore, setPretestScore] = useState(null);
          const [posttestScore, setPosttestScore] = useState(null);
          const [showReport, setShowReport] = useState(false);
          const [user, setUser] = useState({uid: 'local'});
          const [studentsData, setStudentsData] = useState([]);

          useEffect(() => {
            const updateStudentData = async () => {
              if (!userInfo) return;
              try {
                const studentDocId = `${userInfo.room.replace('/', '-')}_${userInfo.number}`;
                await setDoc(studentDocId, {
                  uid: user.uid, name: userInfo.name, room: userInfo.room, number: userInfo.number,
                  pretestScore: pretestScore, posttestScore: posttestScore, lastActive: Date.now(),
                });
              } catch(e) {}
            };
            if (view === 'app' && userInfo) {
              updateStudentData();
              const interval = setInterval(() => updateStudentData(), 60000);
              return () => clearInterval(interval);
            }
          }, [view, userInfo, pretestScore, posttestScore, user]);

          useEffect(() => {
            if (view === 'dashboard') {
              const unsub = onSnapshot((snapshot) => {
                const list = [];
                snapshot.forEach(d => list.push({ id: d.id, ...d.data() }));
                setStudentsData(list);
              });
              return () => unsub();
            }
          }, [view]);

          useEffect(() => {
            if (pretestScore !== null && posttestScore !== null && activeTab === 'posttest') setTimeout(() => setShowReport(true), 1000);
          }, [pretestScore, posttestScore, activeTab]);

          const handleSelectLang = (l) => { setLang(l); setView('role'); };
          const handleSelectRole = (role) => { setSelectedRole(role); if (role === 'student') setView('room'); else setView('teacherPwd'); };

          if (view === 'lang') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-teal-100 flex flex-col items-center justify-center p-4 text-slate-900 font-prompt animate-[fadeIn_0.5s]">
                <div className="flex flex-col items-center mb-8">
                   <TeacherIcon className="w-28 h-28 md:w-36 md:h-36 mb-5 drop-shadow-lg" />
                   <p className="text-emerald-700 font-black tracking-[0.3em] text-xs md:text-sm lg:text-base text-center">CHEMISTRY BY KRUPANPASSA</p>
                </div>
                <h1 className="text-3xl md:text-5xl lg:text-6xl font-black mb-4 text-center tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500 w-full px-4">PowerUp Galvanic Cell</h1>
                <p className="text-slate-500 mb-14 text-center text-xs md:text-sm lg:text-lg font-bold tracking-widest uppercase">Interactive Simulation</p>
                <div className="flex flex-col sm:flex-row gap-4 md:gap-6 w-full max-w-lg px-4">
                  <button onClick={() => handleSelectLang('en')} className="flex-1 bg-white hover:bg-slate-50 border-2 border-slate-100 py-4 md:py-6 px-4 md:px-6 rounded-2xl md:rounded-[2rem] text-center font-bold text-slate-800 shadow-md transition-all hover:border-emerald-300"><span className="text-3xl md:text-4xl block mb-2 md:mb-3 opacity-90">ENG</span> English</button>
                  <button onClick={() => handleSelectLang('th')} className="flex-1 bg-white hover:bg-slate-50 border-2 border-slate-100 py-4 md:py-6 px-4 md:px-6 rounded-2xl md:rounded-[2rem] text-center font-bold text-slate-800 shadow-md transition-all hover:border-emerald-300"><span className="text-3xl md:text-4xl block mb-2 md:mb-3 opacity-90">TH</span> ภาษาไทย</button>
                </div>
              </div>
            );
          }

          const t = dict[lang];

          if (view === 'role') {
            return (
              <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-prompt animate-[fadeIn_0.5s] relative">
                <button onClick={()=>setView('lang')} className="absolute top-4 left-4 md:top-8 md:left-8 text-slate-500 font-bold hover:text-emerald-600 bg-white/50 px-4 py-2 rounded-xl backdrop-blur-sm">← {t.roomSelect.back}</button>
                <h2 className="text-2xl md:text-4xl font-black text-slate-800 mb-8 md:mb-10 text-center w-full mt-10 md:mt-0">{t.roleSelect.title}</h2>
                <div className="flex flex-col sm:flex-row gap-6 md:gap-8 w-full max-w-2xl px-2 md:px-4">
                  <button onClick={() => handleSelectRole('student')} className="flex-1 bg-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-slate-200 shadow-xl hover:shadow-[0_20px_50px_rgba(52,211,153,0.2)] hover:border-emerald-400 transition-all group flex flex-col items-center"><StudentMinimalIcon className="w-16 h-16 md:w-20 md:h-20 mb-4 md:mb-6 group-hover:scale-110 transition-transform block text-emerald-500 drop-shadow-sm" /><span className="text-xl md:text-2xl font-black text-slate-700 group-hover:text-emerald-600">{t.roleSelect.student}</span></button>
                  <button onClick={() => handleSelectRole('teacher')} className="flex-1 bg-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-slate-200 shadow-xl hover:shadow-[0_20px_50px_rgba(59,130,246,0.2)] hover:border-blue-400 transition-all group flex flex-col items-center"><TeacherMinimalIcon className="w-16 h-16 md:w-20 md:h-20 mb-4 md:mb-6 group-hover:scale-110 transition-transform block text-blue-500 drop-shadow-sm" /><span className="text-xl md:text-2xl font-black text-slate-700 group-hover:text-blue-600">{t.roleSelect.teacher}</span></button>
                </div>
              </div>
            );
          }

          if (view === 'teacherPwd') return <PasswordModal lang={lang} title={t.teacher.pwdTitle} expectedPwd="admin" onSuccess={() => setView('dashboard')} onBack={() => setView('role')} />;
          if (view === 'dashboard') return <TeacherDashboard lang={lang} students={studentsData} onLogout={()=>{setView('role'); setStudentsData([]);}} />;

          if (view === 'room') {
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 font-prompt relative overflow-hidden">
                <div className="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-500 via-slate-900 to-slate-900"></div>
                <button onClick={()=>setView('role')} className="absolute top-4 left-4 md:top-8 md:left-8 text-slate-400 font-bold hover:text-white z-10 bg-slate-800/50 px-4 py-2 rounded-xl backdrop-blur-sm">← {t.roomSelect.back}</button>
                <div className="z-10 text-center mb-8 md:mb-12 mt-10 md:mt-0 w-full px-4"><h2 className="text-2xl md:text-5xl font-black text-white mb-2 md:mb-4 drop-shadow-[0_0_15px_rgba(52,211,153,0.6)] leading-tight">{t.roomSelect.title}</h2><p className="text-emerald-400 font-bold tracking-widest text-sm md:text-lg">{t.roomSelect.desc}</p></div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-8 w-full max-w-2xl px-4 z-10">
                  {['6/1', '6/2'].map(r => (
                    <button key={r} onClick={() => { setSelectedRoom(r); setView('pwd'); }} className="relative p-8 md:p-12 rounded-[2rem] md:rounded-[2.5rem] bg-slate-800/50 backdrop-blur-md border border-slate-700 shadow-[0_0_30px_rgba(16,185,129,0.1)] hover:shadow-[0_0_50px_rgba(52,211,153,0.5)] hover:border-emerald-400 hover:bg-slate-800 transition-all duration-300 group flex flex-col items-center justify-center overflow-hidden"><div className="absolute inset-0 bg-gradient-to-b from-emerald-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div><span className="text-4xl md:text-6xl mb-4 md:mb-6 group-hover:-translate-y-2 transition-transform duration-300 block drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">🚪</span><span className="text-2xl md:text-3xl font-black text-slate-300 group-hover:text-emerald-300 transition-colors">ม. {r}</span></button>
                  ))}
                </div>
              </div>
            );
          }

          if (view === 'pwd') return <PasswordModal lang={lang} title={`${t.roomSelect.pwdTitle} ม.${selectedRoom}`} expectedPwd={selectedRoom==='6/1'?'6001':'6002'} onSuccess={() => setView('register')} onBack={() => setView('room')} />;
          if (view === 'register') return <RegistrationForm lang={lang} room={`6/${selectedRoom.split('/')[1]}`} onBack={() => setView('room')} onRegister={(info) => { setUserInfo(info); setView('app'); setShowToast(true); setTimeout(() => setShowToast(false), 4000); }} />;

          const navItems = [
            { id: 'pretest', label: t.nav.pre, icon: <PretestIcon className="w-4 h-4 md:mr-2 inline-block" /> },
            { id: 'theory', label: t.nav.theory, icon: <TheoryIcon className="w-4 h-4 md:mr-2 inline-block" /> },
            { id: 'experiment', label: t.nav.exp, icon: <ExperimentIcon className="w-4 h-4 md:mr-2 inline-block" /> },
            { id: 'posttest', label: t.nav.post, icon: <PosttestIcon className="w-4 h-4 md:mr-2 inline-block" /> }
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-emerald-50 via-slate-50 to-teal-50 font-prompt text-slate-900 pb-24 md:pb-20 transition-colors relative w-full overflow-x-hidden">
              <div className={`fixed top-16 md:top-24 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-500 ${showToast ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0 pointer-events-none'} w-[90%] max-w-sm`}>
                 <div className="bg-slate-900 text-white px-4 md:px-8 py-3 md:py-4 rounded-full shadow-2xl text-xs md:text-base font-bold flex items-center justify-center gap-2 md:gap-3 border border-slate-700 whitespace-nowrap overflow-hidden"><span className="w-2 h-2 md:w-3 md:h-3 bg-emerald-500 rounded-full animate-pulse flex-shrink-0"></span><span className="truncate">{userInfo ? `${userInfo.name} ${t.onlineAlert}` : t.onlineAlert}</span></div>
              </div>
              <nav className="bg-white/90 backdrop-blur-lg sticky top-0 z-50 border-b border-slate-200 mb-4 md:mb-8 shadow-sm">
                <div className="max-w-7xl mx-auto px-2 md:px-6">
                  <div className="flex flex-col lg:flex-row justify-between items-center py-2 md:py-4 gap-2 md:gap-4 w-full">
                    <div className="w-full flex justify-between lg:justify-start items-center lg:w-auto">
                      <h1 className="text-lg md:text-2xl font-black flex items-center gap-2 md:gap-4 bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-600 cursor-pointer truncate" onClick={() => setView('lang')}><TeacherIcon className="w-8 h-8 md:w-10 md:h-10 flex-shrink-0" /> <span className="truncate hidden sm:inline">PowerUp Galvanic Cell</span><span className="truncate sm:hidden">PowerUp Galvanic</span></h1>
                      <button onClick={() => { setView('role'); setUserInfo(null); setPretestScore(null); setPosttestScore(null); }} className="lg:hidden flex items-center justify-center text-[10px] md:text-xs font-bold text-red-500 bg-red-50 border border-red-100 hover:bg-red-100 px-3 py-2 rounded-xl transition-colors shadow-sm ml-2 flex-shrink-0">{lang === 'en' ? 'Leave' : 'ออก'}</button>
                    </div>
                    <div className="flex flex-col w-full lg:w-auto items-center gap-2 md:gap-5">
                      <div className="flex w-full overflow-x-auto justify-start lg:justify-center gap-1.5 md:gap-2 pb-1 lg:pb-0 scrollbar-none px-1">
                        {navItems.map(item => (
                          <button key={item.id} onClick={() => setActiveTab(item.id)} className={`px-3 md:px-5 py-2 md:py-3 rounded-xl md:rounded-2xl text-xs md:text-sm font-bold transition-all border-2 flex items-center flex-shrink-0 ${activeTab === item.id ? 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white border-transparent shadow-md transform md:scale-105' : 'bg-white text-slate-600 border-slate-100 hover:border-slate-300 hover:bg-slate-50'}`}>{item.icon} <span className="hidden sm:inline">{item.label}</span></button>
                        ))}
                      </div>
                      <div className="hidden lg:flex items-center gap-3">
                        <div className="flex items-center gap-2 bg-slate-50 px-5 py-2.5 rounded-2xl text-xs font-bold text-slate-700 border border-slate-200 shadow-inner">👤 <span className="truncate max-w-[120px]">{userInfo?.name}</span> <span className="text-emerald-600 ml-1 whitespace-nowrap">(ม.{userInfo?.room})</span></div>
                        <button onClick={() => setLang(lang === 'en' ? 'th' : 'en')} className="flex items-center text-xs font-bold text-slate-600 bg-white border-2 border-slate-200 hover:bg-slate-50 px-4 py-3 rounded-2xl transition-colors shadow-sm"><LanguageIcon /> {lang === 'en' ? 'TH' : 'EN'}</button>
                        <button onClick={() => { setView('role'); setUserInfo(null); setPretestScore(null); setPosttestScore(null); }} className="flex items-center text-xs font-bold text-red-500 bg-red-50 border-2 border-red-100 hover:bg-red-100 px-4 py-3 rounded-2xl transition-colors shadow-sm">{lang === 'en' ? 'Leave' : 'ออก'}</button>
                      </div>
                    </div>
                  </div>
                </div>
              </nav>

              <main className="w-full max-w-7xl mx-auto px-2 md:px-6 flex-1">
                {activeTab === 'pretest' && <QuizComponent lang={lang} title={t.quiz.preTitle} questions={QUIZ_QUESTIONS} onFinish={setPretestScore} hideSubmit={pretestScore !== null} isPretest={true} />}
                {activeTab === 'theory' && <TheoryComponent lang={lang} />}
                {activeTab === 'experiment' && <GalvanicCellSimulator lang={lang} />}
                {activeTab === 'posttest' && <QuizComponent lang={lang} title={t.quiz.postTitle} questions={QUIZ_QUESTIONS} onFinish={setPosttestScore} hideSubmit={posttestScore !== null} isPretest={false} />}
              </main>

              {(pretestScore !== null || posttestScore !== null) && (
                <div className="fixed bottom-4 md:bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/95 backdrop-blur-md text-white py-2 px-2 md:px-3 rounded-full text-[10px] md:text-sm font-bold z-40 flex items-center shadow-2xl border border-slate-700 w-[96%] max-w-md md:max-w-max md:w-auto">
                  <div className="flex items-center gap-1.5 md:gap-2 overflow-x-auto whitespace-nowrap px-2 md:px-3 scrollbar-none w-full md:w-auto justify-center">
                    <span className="opacity-70 px-1 md:px-2 tracking-wide uppercase hidden sm:inline">{t.quiz.score}</span> 
                    <span className="bg-slate-800 border border-slate-600 px-3 md:px-5 py-1.5 md:py-2.5 rounded-full shadow-inner flex-shrink-0">{t.nav.pre}: {pretestScore !== null ? `${pretestScore}/10` : '-'}</span>
                    <span className="bg-slate-800 border border-slate-600 px-3 md:px-5 py-1.5 md:py-2.5 rounded-full shadow-inner flex-shrink-0">{t.nav.post}: {posttestScore !== null ? `${posttestScore}/10` : '-'}</span>
                    {(pretestScore !== null && posttestScore !== null) && (<button onClick={() => setShowReport(true)} className="ml-1 md:ml-3 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 px-4 md:px-8 py-1.5 md:py-3 rounded-full shadow-lg transition-transform hover:scale-105 flex-shrink-0 font-black tracking-wide">REPORT</button>)}
                  </div>
                </div>
              )}
              {showReport && <ReportCard lang={lang} userInfo={userInfo} pretestScore={pretestScore} posttestScore={posttestScore} onClose={() => setShowReport(false)} />}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
