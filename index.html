      { id: 2, q: { th: "2. ต่อไปนี้คือหน้าที่หลักของสะพานเกลือ (Salt Bridge)", en: "2. Which of the following is the main function of a salt bridge?" }, options: { th: ["รักษาสมดุลของประจุไฟฟ้าในแต่ละครึ่งเซลล์", "เพิ่มความต่างศักย์ให้แก่เซลล์กัลวานิก", "เร่งปฏิกิริยารีดอกซ์ให้เกิดขึ้นรวดเร็วขึ้น", "เป็นทางผ่านของอิเล็กตรอนระหว่างสองครึ่งเซลล์"], en: ["Maintain electrical neutrality in each half-cell", "Increase the potential difference of the cell", "Accelerate the redox reaction", "Act as a pathway for electrons between half-cells"] }, ans: 0 },
      { id: 3, q: { th: "3. กำหนดให้ค่า E⁰ ของครึ่งเซลล์เป็นดังนี้ เมื่อนำมาต่อเป็นเซลล์กัลวานิก ค่า E⁰cell จะมีค่าเท่าใด", en: "3. Given the E⁰ values of the half-cells below. When connected as a galvanic cell, what is the E⁰cell?" }, options: { th: ["-0.78 V", "0.78 V", "0.10 V", "-0.10 V"], en: ["-0.78 V", "0.78 V", "0.10 V", "-0.10 V"] }, ans: 1 },
      { id: 4, q: { th: "4. จากแผนภาพเซลล์ดังต่อไปนี้ Zn(s)|Zn²⁺(aq)||Cu²⁺(aq)|Cu(s) ข้อใดอธิบายทิศทางการไหลของอิเล็กตรอนได้ถูกต้อง", en: "4. From the cell diagram Zn(s)|Zn²⁺(aq)||Cu²⁺(aq)|Cu(s), which correctly describes the electron flow?" }, options: { th: ["ไหลจากสารละลาย Cu²⁺ ไปยังสารละลาย Zn²⁺", "ไหลจากขั้ว Zn ไปยังขั้ว Cu ผ่านสะพานเกลือ", "ไหลจากขั้ว Zn ไปยังขั้ว Cu ผ่านสายไฟ", "ไหลจากขั้ว Cu ไปยังขั้ว Zn ผ่านสายไฟ"], en: ["From Cu²⁺ solution to Zn²⁺ solution", "From Zn to Cu via salt bridge", "From Zn to Cu via wire", "From Cu to Zn via wire"] }, ans: 2 },
      { id: 5, q: { th: "5. เมื่อเวลาผ่านไป มวลของขั้วไฟฟ้าในเซลล์กัลวานิก มีการเปลี่ยนแปลงอย่างไร", en: "5. Over time, how does the mass of the electrodes in a galvanic cell change?" }, options: { th: ["ขั้วแอโนดมวลเพิ่มขึ้น ขั้วแคโทดมวลลดลง", "มวลของทั้งสองขั้วลดลง", "มวลของทั้งสองขั้วเพิ่มขึ้น", "ขั้วแอโนดมวลลดลง ขั้วแคโทดมวลเพิ่มขึ้น"], en: ["Anode mass increases, cathode mass decreases", "Mass of both electrodes decreases", "Mass of both electrodes increases", "Anode mass decreases, cathode mass increases"] }, ans: 3 },
      { id: 6, q: { th: "6. ปฏิกิริยารวมของเซลล์ Ag(s)|Ag⁺(aq)||Fe²⁺(aq)|Fe(s) ข้อใดต่อไปนี้เขียนสมการรีดอกซ์ได้ถูกต้อง", en: "6. Given the cell diagram Ag(s)|Ag⁺(aq)||Fe²⁺(aq)|Fe(s), which is the correct overall redox equation?" }, options: { th: ["Ag⁺(aq) + Fe(s) → Ag(s) + Fe²⁺(aq)", "Ag(s) + Fe²⁺(aq) → Ag⁺(aq) + Fe(s)", "Ag⁺(aq) + Fe²⁺(aq) → Ag(s) + Fe(s)", "2Ag(s) + Fe²⁺(aq) → 2Ag⁺(aq) + Fe(s)"], en: ["Ag⁺(aq) + Fe(s) → Ag(s) + Fe²⁺(aq)", "Ag(s) + Fe²⁺(aq) → Ag⁺(aq) + Fe(s)", "Ag⁺(aq) + Fe²⁺(aq) → Ag(s) + Fe(s)", "2Ag(s) + Fe²⁺(aq) → 2Ag⁺(aq) + Fe(s)"] }, ans: 3 },
      { id: 7, q: { th: "7. หากค่า E⁰cell ของปฏิกิริยาหนึ่งเป็นลบ หมายความว่าอย่างไร", en: "7. If the E⁰cell of a reaction is negative, what does it mean?" }, options: { th: ["มีการใช้สะพานเกลือผิดประเภท", "ปฏิกิริยานี้เกิดขึ้นได้รวดเร็วมาก", "เซลล์กัลป์วานิกนี้ประสิทธิภาพสูง", "ปฏิกิริยานี้ไม่สามารถเกิดขึ้นได้เอง"], en: ["Wrong type of salt bridge is used", "The reaction occurs very fast", "The galvanic cell is highly efficient", "The reaction cannot occur spontaneously"] }, ans: 3 },
      { id: 8, q: { th: "8. SHE ต่อกับ Zn (E0 = -0.76 V) ขั้ว SHE ทำหน้าที่อะไร", en: "8. SHE connected to Zn (-0.76 V), role of SHE?" }, options: { th: ["ขั้วแอโนด", "ไม่ทำหน้าที่ใด ๆ", "ขั้วแคโทด", "เป็นได้ทั้งสอง"], en: ["Anode", "No role", "Cathode", "Both"] }, ans: 2 },
      { id: 9, q: { th: "9. ปฏิกิริยาที่เกิดขึ้นภายในเซลล์ Fe + Cl2 คือข้อใด", en: "9. Reaction for Fe + Cl2 is?" }, options: { th: ["Fe + Cl₂ → 2Cl⁻ + Fe²⁺", "Fe + Cl₂ → 2Cl⁻ + Fe³⁺", "Fe²⁺ + 2Cl⁻ → Cl₂ + Fe", "Fe + 2Cl⁻ → Cl₂ + Fe³⁺"], en: ["Fe + Cl₂ → 2Cl⁻ + Fe²⁺", "Fe + Cl₂ → 2Cl⁻ + Fe³⁺", "Fe²⁺ + 2Cl⁻ → Cl₂ + Fe", "Fe + 2Cl⁻ → Cl₂ + Fe³⁺"] }, ans: 0 },
      { id: 10, q: { th: "10. ค่าศักย์ไฟฟ้ามาตรฐานของเหล็กในระบบนี้มีค่ากี่โวลต์", en: "10. E0 of Iron in this system is?" }, options: { th: ["0.44 V", "-0.44 V", "2.16 V", "-2.16 V"], en: ["0.44 V", "-0.44 V", "2.16 V", "-2.16 V"] }, ans: 1 }
    ];

    const lcm = (a, b) => { const gcd = (x, y) => (!y ? x : gcd(y, x % y)); return (a * b) / gcd(a, b); };

    // --- Components ---
    const Icon = ({ name, className }) => {
      if (name === 'teacher') return <svg className={className} viewBox="0 0 100 100" fill="none"><circle cx="50" cy="38" r="22" fill="#ffedd5" /><path d="M 25 40 Q 15 80 20 100 L 80 100 Q 85 80 75 40 Z" fill="#1e293b" /></svg>;
      if (name === 'pre') return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;
      if (name === 'theory') return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
      if (name === 'experiment') return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 3H15M10 3V8L3 19A2 2 0 0 0 5 22H19A2 2 0 0 0 21 19L14 8V3"/></svg>;
      if (name === 'post') return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M9 15L11 17L15 13"/></svg>;
      return null;
    };

    const QuizComponent = ({ lang, title, questions, onFinish, isPretest }) => {
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [score, setScore] = useState(0);

      const handleSubmit = () => {
        let s = 0; questions.forEach((q, i) => { if (answers[i] === q.ans) s++; });
        setScore(s); setSubmitted(true); onFinish(s);
      };

      return (
        <div className="bg-white p-8 rounded-[2rem] shadow-xl animate-[fadeIn_0.5s]">
          <h2 className="text-3xl font-black mb-8 text-center text-emerald-600">{title}</h2>
          {submitted ? (
            <div className="text-center p-10 bg-emerald-50 rounded-3xl border-2 border-emerald-200">
               <h3 className="text-5xl font-black mb-4">{score} / 10</h3>
               <p className="font-bold text-emerald-700">บันทึกคะแนนเรียบร้อยแล้ว!</p>
            </div>
          ) : (
            <div className="space-y-8">
              {questions.map((q, i) => (
                <div key={i} className="p-6 bg-slate-50 rounded-2xl border">
                  <p className="font-bold text-lg mb-4">{q.q[lang]}</p>
                  <div className="grid gap-3">
                    {q.options[lang].map((opt, oi) => (
                      <button key={oi} onClick={() => setAnswers({...answers, [i]: oi})} className={`text-left p-4 rounded-xl border-2 transition-all ${answers[i] === oi ? 'border-emerald-500 bg-emerald-50' : 'bg-white border-slate-100'}`}>{opt}</button>
                    ))}
                  </div>
                </div>
              ))}
              <button disabled={Object.keys(answers).length < 10} onClick={handleSubmit} className="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl disabled:bg-slate-200">ส่งคำตอบ</button>
            </div>
          )}
        </div>
      );
    };

    // --- Main App ---
    function App() {
      const [lang, setLang] = useState('th');
      const [view, setView] = useState('lang'); 
      const [userInfo, setUserInfo] = useState(null);
      const [activeTab, setActiveTab] = useState('simulation');
      const [pretestScore, setPretestScore] = useState(null);
      const [posttestScore, setPosttestScore] = useState(null);
      const [students, setStudents] = useState([]);

      useEffect(() => { auth.signInAnonymously().catch(console.error); }, []);

      const updateData = async (data) => {
        if (!userInfo) return;
        const id = `${userInfo.room}_${userInfo.number}`;
        await db.collection('students').doc(id).set({...userInfo, ...data, lastActive: Date.now()}, {merge: true});
      };

      if (view === 'lang') return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-white p-4">
          <Icon name="teacher" className="w-32 h-32 mb-6" />
          <h1 className="text-4xl font-black text-emerald-600 mb-8">PowerUp Galvanic Cell</h1>
          <div className="flex gap-4">
            <button onClick={() => {setLang('th'); setView('role')}} className="px-10 py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">ภาษาไทย</button>
            <button onClick={() => {setLang('en'); setView('role')}} className="px-10 py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg">English</button>
          </div>
        </div>
      );

      if (view === 'role') return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-4">
          <h2 className="text-2xl font-black mb-10">กรุณาเลือกสถานะ</h2>
          <div className="flex gap-6 w-full max-w-xl">
            <button onClick={() => setView('room')} className="flex-1 bg-white p-10 rounded-[2.5rem] shadow-xl border-2 border-transparent hover:border-emerald-400 transition-all flex flex-col items-center">
              <span className="text-6xl mb-4">🎓</span><span className="text-xl font-black">นักเรียน</span>
            </button>
            <button onClick={() => { if(prompt("Pass?")==='admin') setView('dashboard') }} className="flex-1 bg-white p-10 rounded-[2.5rem] shadow-xl border-2 border-transparent hover:border-blue-400 transition-all flex flex-col items-center">
              <span className="text-6xl mb-4">👨‍🏫</span><span className="text-xl font-black">ครูผู้สอน</span>
            </button>
          </div>
        </div>
      );

      if (view === 'room') return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
          <h2 className="text-white text-3xl font-black mb-10">เลือกห้องเรียน</h2>
          <div className="flex gap-6">
            {['6/1', '6/2'].map(r => (
              <button key={r} onClick={() => {
                const name = prompt("ชื่อ-นามสกุล:");
                const num = prompt("เลขที่:");
                if(name && num) { setUserInfo({name, number: num, room: r}); setView('app'); }
              }} className="w-40 h-40 bg-slate-800 text-white rounded-3xl text-3xl font-bold hover:bg-emerald-500 transition-all border border-slate-700">ม.{r}</button>
            ))}
          </div>
        </div>
      );

      if (view === 'dashboard') {
        useEffect(() => {
          return db.collection('students').onSnapshot(snap => {
            const list = []; snap.forEach(d => list.push(d.data()));
            setStudents(list);
          });
        }, []);
        return (
          <div className="p-4 md:p-10 bg-slate-50 min-h-screen">
            <div className="max-w-6xl mx-auto flex justify-between items-center mb-8">
              <h2 className="text-3xl font-black">Teacher Dashboard</h2>
              <button onClick={() => setView('role')} className="bg-white px-6 py-2 rounded-xl font-bold border shadow-sm">ย้อนกลับ</button>
            </div>
            <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden border">
              <table className="w-full text-left">
                <thead className="bg-slate-800 text-white">
                  <tr><th className="p-5">เลขที่</th><th className="p-5">ชื่อ-สกุล</th><th className="p-5">ห้อง</th><th className="p-5 text-center">Pre</th><th className="p-5 text-center">Post</th></tr>
                </thead>
                <tbody>
                  {students.sort((a,b)=>a.number-b.number).map((s, i) => (
                    <tr key={i} className="border-b hover:bg-slate-50">
                      <td className="p-5 font-bold">{s.number}</td><td className="p-5 font-medium">{s.name}</td><td className="p-5 text-emerald-600 font-bold">{s.room}</td>
                      <td className="p-5 text-center font-bold text-slate-500">{s.pretestScore ?? '-'}</td>
                      <td className="p-5 text-center font-bold text-emerald-500">{s.posttestScore ?? '-'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      if (view === 'app') return (
        <div className="min-h-screen bg-slate-50">
          <nav className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 p-4 flex justify-between items-center shadow-sm">
            <span className="font-black text-emerald-600 text-xl">PowerUp Simulation</span>
            <div className="flex gap-2">
              {['pretest', 'theory', 'simulation', 'posttest'].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-xl text-xs font-black uppercase transition-all ${activeTab === tab ? 'bg-emerald-500 text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>{tab}</button>
              ))}
            </div>
          </nav>

          <main className="p-4 max-w-5xl mx-auto pt-8">
            {activeTab === 'simulation' && (
              <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border text-center animate-[fadeIn_0.5s]">
                <h2 className="text-2xl font-black text-slate-800 mb-8">Virtual Laboratory</h2>
                <div className="bg-slate-50 p-10 rounded-[2.5rem] border-4 border-dashed border-slate-200 mb-8">
                   <div className="flex justify-center gap-20 mb-10">
                      <div className="relative">
                        <div className="w-24 h-40 bg-blue-100 rounded-b-2xl border-x-4 border-b-4 border-blue-200 shadow-inner"></div>
                        <div className="absolute top-[-20px] left-8 w-8 h-48 bg-slate-400 rounded-lg shadow-lg border-2 border-slate-500"></div>
                        <p className="mt-4 font-black text-slate-500">Anode</p>
                      </div>
                      <div className="relative">
                        <div className="w-24 h-40 bg-red-100 rounded-b-2xl border-x-4 border-b-4 border-red-200 shadow-inner"></div>
                        <div className="absolute top-[-20px] left-8 w-8 h-48 bg-orange-400 rounded-lg shadow-lg border-2 border-orange-500"></div>
                        <p className="mt-4 font-black text-slate-500">Cathode</p>
                      </div>
                   </div>
                   <div className="bg-slate-900 text-emerald-400 px-10 py-6 rounded-3xl font-mono text-4xl shadow-2xl inline-block border-4 border-slate-800">
                      Voltage: +1.10 V
                   </div>
                </div>
                <p className="text-slate-400 font-bold uppercase tracking-widest">🧪 Simulation Logic Active</p>
              </div>
            )}

            {activeTab === 'theory' && (
              <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border animate-[fadeIn_0.5s]">
                <h2 className="text-3xl font-black mb-8 border-b pb-6 text-slate-800">Galvanic Cell Theory</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-red-50 p-8 rounded-[2rem] border border-red-100">
                    <h3 className="font-black text-red-600 text-xl mb-4">Anode (-)</h3>
                    <ul className="space-y-3 text-slate-700 font-medium"><li>• Oxidation Occurs</li><li>• Electron Donor</li><li>• Mass Corrodes</li></ul>
                  </div>
                  <div className="bg-blue-50 p-8 rounded-[2rem] border border-blue-100">
                    <h3 className="font-black text-blue-600 text-xl mb-4">Cathode (+)</h3>
                    <ul className="space-y-3 text-slate-700 font-medium"><li>• Reduction Occurs</li><li>• Electron Acceptor</li><li>• Mass Plates</li></ul>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'pretest' && <QuizComponent lang={lang} title="Pre-test" questions={QUIZ_QUESTIONS} onFinish={s => {setPretestScore(s); updateData({pretestScore: s});}} />}
            {activeTab === 'posttest' && <QuizComponent lang={lang} title="Post-test" questions={QUIZ_QUESTIONS} onFinish={s => {setPosttestScore(s); updateData({posttestScore: s});}} />}
          </main>

          <footer className="fixed bottom-6 right-6">
            <div className="bg-slate-900 text-white px-8 py-5 rounded-full shadow-2xl flex gap-6 font-bold">
               <span>👤 {userInfo?.name} (ม.{userInfo?.room})</span>
               <span className="opacity-30">|</span>
               <span>Pre: {pretestScore ?? '-'}</span>
               <span className="opacity-30">|</span>
               <span>Post: {posttestScore ?? '-'}</span>
            </div>
          </footer>
        </div>
      );

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
